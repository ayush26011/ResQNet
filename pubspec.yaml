name: resqnet
description: ResQNet — Premium Emergency Response App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  go_router: ^14.0.2
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
