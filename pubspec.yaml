  lottie: ^3.1.2
  sqflite: ^2.3.0
  path: ^1.9.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  llm_core: ^0.1.9
  llm_llamacpp:
    path: ./llm_llamacpp
  path_provider: ^2.1.3
  file_picker: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
